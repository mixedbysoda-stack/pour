name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git JUCE

      - name: Get version from CMakeLists.txt
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^project(Pour VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist/Windows/VST3
          mkdir -p dist/Windows/Standalone
          cp -r "build/Pour_artefacts/Release/VST3/Pour.vst3" dist/Windows/VST3/ || true
          cp "build/Pour_artefacts/Release/Standalone/Pour.exe" dist/Windows/Standalone/ || true

      - name: Update Inno Setup version
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/AppVersion=.*/AppVersion=$VERSION/" installer/windows/pour.iss
          sed -i "s/AppVerName=.*/AppVerName=Pour v$VERSION/" installer/windows/pour.iss
          sed -i "s/OutputBaseFilename=.*/OutputBaseFilename=Pour-v$VERSION-Windows-Installer/" installer/windows/pour.iss

      - name: Build Installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\pour.iss

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Pour-Windows-VST3
          path: dist/Windows/VST3/

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: Pour-Windows-Standalone
          path: dist/Windows/Standalone/

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: Pour-Windows-Installer
          path: dist/Windows/Installer/Pour-*.exe

      - name: Create Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cd dist/Windows
          7z a -tzip ../../Pour-Windows.zip VST3/ Standalone/

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Pour-Windows.zip
            dist/Windows/Installer/Pour-*.exe
